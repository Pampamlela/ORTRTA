name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    backend:
        runs-on: ubuntu-latest

        services:
          db:
            image: postgres:16
            env:
              POSTGRES_DB: ortrta
              POSTGRES_USER: ortrta_user
              POSTGRES_PASSWORD: ortrta_password
            ports:
              - 5432:5432
            options: >-
              --health-cmd "pg_isready -U ortrta_user -d ortrta"
              --health-interval 10s
              --health-timeout 5s
              --health-retries 5


        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.12'

            - name: Install backend dependencies
              run: |
                cd backend
                pip install -r requirements.txt

            - name: Django check
              run: |
                cd backend
                python manage.py check

            - name: Run migrations
              run: |
                cd backend
                python manage.py migrate

            - name: Run backend tests
              run: |
                cd backend
                python manage.py test

    frontend:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Node
              uses: actions/setup-node@v3
              with:
                node-version: '22.13.1'

            - name: Install frontend dependencies
              run: |
                cd frontend
                npm install

            - name: Build frontend
              run: |
                cd frontend
                npm run build

            
            
